name: New API 自动签到

on:
  schedule:
    # 每天多次兜底(北京 9:00 / 13:00 / 20:00 = UTC 1:00 / 5:00 / 12:00)
    # 已签到会被识别为"今日已签到"，幂等，不会重复发奖或报错
    - cron: '0 1 * * *'
    - cron: '0 5 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: pip install -r requirements.txt

    - name: 执行签到
      env:
        ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        NOTIFICATION_WEBHOOK: ${{ secrets.NOTIFICATION_WEBHOOK }}
      run: python checkin_api.py

    - name: 上传日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: checkin-log-${{ github.run_number }}
        path: checkin.log
        retention-days: 7
